name: Build and release executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG entry exists
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $pattern = "## \[$([regex]::Escape($version))\]"
          $found = Select-String -Path "CHANGELOG.md" -Pattern $pattern -Quiet
          if (-not $found) {
            Write-Error "No CHANGELOG.md entry found for version $version. Add a '## [$version]' section to CHANGELOG.md before tagging a release."
            exit 1
          }
          Write-Host "Found CHANGELOG.md entry for version $version"

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest

  build:
    needs: test
    runs-on: windows-latest

    permissions:
        contents: write

    steps:
    - name: Code checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Compile executable
      run: |
        pyinstaller --noconsole --onefile --name "zarokh" --icon "assets/images/zarokh.ico" --paths src --add-data "assets;assets" src/zarokh/__main__.py

    - name: Smoke test
      run: |
        Start-Process -FilePath "dist\zarokh.exe"
        Start-Sleep -Seconds 3
        $process = Get-Process zarokh -ErrorAction SilentlyContinue
        if (-not $process) {
          Write-Error "zarokh.exe did not stay running — smoke test failed"
          exit 1
        }
        Stop-Process -Name zarokh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        files: dist/zarokh.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}